<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" role="img"
  style="font-family: ui-sans-serif, system-ui, sans-serif; background: transparent;">
  <title>Scaled dot-product attention</title>
  <desc>Four steps of the attention formula shown left to right: Q times K-transpose produces raw scores, dividing by square-root d-k scales them, softmax normalises into weights, multiplying by V mixes values into the output.</desc>

  <defs>
    <style>
      @keyframes fadein {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0);   }
      }
      @keyframes arrow-grow {
        from { stroke-dashoffset: 40; opacity: 0; }
        to   { stroke-dashoffset: 0;  opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .step, .arr-anim { animation: none !important; opacity: 1 !important; }
      }
      .step { opacity: 0; animation: fadein 0.5s ease both; }
      .s1 { animation-delay: 0.1s; }
      .s2 { animation-delay: 0.6s; }
      .s3 { animation-delay: 1.1s; }
      .s4 { animation-delay: 1.6s; }
      .s5 { animation-delay: 2.1s; }
      .arr-anim {
        stroke-dasharray: 40;
        stroke-dashoffset: 40;
        opacity: 0;
        animation: arrow-grow 0.3s ease both;
      }
      .a1 { animation-delay: 0.45s; }
      .a2 { animation-delay: 0.95s; }
      .a3 { animation-delay: 1.45s; }
      .a4 { animation-delay: 1.95s; }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- formula strip -->
  <text x="340" y="34" text-anchor="middle"
    style="font-size:13px; font-weight:600; fill:#C9C5BC; font-family: ui-monospace, monospace;">
    Attention(Q, K, V) = softmax( QK&#x1D40; / &#x221A;d&#x2096; ) &#xB7; V
  </text>

  <!-- step 1: Q · Kᵀ -->
  <g class="step s1">
    <rect x="26" y="68" width="114" height="72" rx="8"
      fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="83" y="96" text-anchor="middle" dominant-baseline="central"
      style="font-size:15px; font-weight:600; fill:#26215C; font-family: ui-monospace, monospace;">Q · K&#x1D40;</text>
    <text x="83" y="118" text-anchor="middle" dominant-baseline="central"
      style="font-size:11px; fill:#534AB7;">raw scores</text>
  </g>

  <!-- arrow 1 -->
  <line class="arr-anim a1" x1="140" y1="104" x2="168" y2="104"
    stroke="#B4B2A9" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- step 2: ÷ √dₖ -->
  <g class="step s2">
    <rect x="170" y="68" width="114" height="72" rx="8"
      fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="227" y="93" text-anchor="middle" dominant-baseline="central"
      style="font-size:15px; font-weight:600; fill:#04342C; font-family: ui-monospace, monospace;">&#xF7; &#x221A;d&#x2096;</text>
    <text x="227" y="113" text-anchor="middle" dominant-baseline="central"
      style="font-size:11px; fill:#0F6E56;">stabilise variance</text>
  </g>

  <!-- arrow 2 -->
  <line class="arr-anim a2" x1="284" y1="104" x2="312" y2="104"
    stroke="#B4B2A9" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- step 3: softmax -->
  <g class="step s3">
    <rect x="314" y="68" width="114" height="72" rx="8"
      fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="371" y="93" text-anchor="middle" dominant-baseline="central"
      style="font-size:14px; font-weight:600; fill:#04342C; font-family: ui-monospace, monospace;">softmax</text>
    <text x="371" y="113" text-anchor="middle" dominant-baseline="central"
      style="font-size:11px; fill:#0F6E56;">weights sum to 1</text>
  </g>

  <!-- arrow 3 -->
  <line class="arr-anim a3" x1="428" y1="104" x2="456" y2="104"
    stroke="#B4B2A9" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- step 4: · V -->
  <g class="step s4">
    <rect x="458" y="68" width="100" height="72" rx="8"
      fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
    <text x="508" y="93" text-anchor="middle" dominant-baseline="central"
      style="font-size:15px; font-weight:600; fill:#412402; font-family: ui-monospace, monospace;">&#xB7; V</text>
    <text x="508" y="113" text-anchor="middle" dominant-baseline="central"
      style="font-size:11px; fill:#854F0B;">mix values</text>
  </g>

  <!-- arrow 4 -->
  <line class="arr-anim a4" x1="558" y1="104" x2="584" y2="104"
    stroke="#B4B2A9" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- output -->
  <g class="step s5">
    <rect x="586" y="80" width="72" height="48" rx="8"
      fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="622" y="107" text-anchor="middle" dominant-baseline="central"
      style="font-size:12px; font-weight:500; fill:#2C2C2A;">output</text>
  </g>

  <!-- annotation row -->
  <g class="step s1">
    <text x="83" y="172" text-anchor="middle" style="font-size:10px; fill:#888780;">Q = what I seek</text>
    <text x="83" y="185" text-anchor="middle" style="font-size:10px; fill:#888780;">K = what I offer</text>
  </g>
  <g class="step s2">
    <text x="227" y="172" text-anchor="middle" style="font-size:10px; fill:#888780;">variance of QK&#x1D40; = d&#x2096;</text>
    <text x="227" y="185" text-anchor="middle" style="font-size:10px; fill:#888780;">÷&#x221A;d&#x2096; restores var=1</text>
  </g>
  <g class="step s3">
    <text x="371" y="172" text-anchor="middle" style="font-size:10px; fill:#888780;">soft distribution</text>
    <text x="371" y="185" text-anchor="middle" style="font-size:10px; fill:#888780;">over all positions</text>
  </g>
  <g class="step s4">
    <text x="508" y="172" text-anchor="middle" style="font-size:10px; fill:#888780;">V = what I pass</text>
    <text x="508" y="185" text-anchor="middle" style="font-size:10px; fill:#888780;">forward</text>
  </g>

  <!-- bottom note -->
  <g class="step s5">
    <text x="340" y="240" text-anchor="middle"
      style="font-size:11px; fill:#888780; font-style:italic;">
      Each token attends to all others — in parallel, not sequentially
    </text>
  </g>

</svg>
