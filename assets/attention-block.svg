<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 380" role="img"
  style="font-family: ui-sans-serif, system-ui, sans-serif; background: transparent;">
  <title>Transformer encoder and decoder blocks</title>
  <desc>Two columns. Left is the encoder block: self-attention, add and norm, feed-forward, add and norm stacked bottom to top. Right is the decoder block with three sublayers: masked self-attention, add and norm, encoder-decoder attention, add and norm, feed-forward, add and norm. A dashed arrow from encoder output feeds into the decoder's cross-attention layer.</desc>

  <defs>
    <style>
      @keyframes fadein {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes dash-flow {
        to { stroke-dashoffset: -16; }
      }
      @media (prefers-reduced-motion: reduce) {
        .blk, .flow-line { animation: none !important; opacity: 1 !important; }
      }
      .blk { opacity: 0; animation: fadein 0.4s ease both; }
      .b1  { animation-delay: 0.05s; }
      .b2  { animation-delay: 0.2s;  }
      .b3  { animation-delay: 0.35s; }
      .b4  { animation-delay: 0.5s;  }
      .b5  { animation-delay: 0.65s; }
      .b6  { animation-delay: 0.8s;  }
      .b7  { animation-delay: 0.95s; }
      .b8  { animation-delay: 1.1s;  }
      .b9  { animation-delay: 1.3s;  }
      .flow-line {
        stroke-dasharray: 6 4;
        animation: dash-flow 1.4s linear infinite;
        opacity: 0.55;
      }
    </style>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- column labels -->
  <rect x="127" y="8" width="138" height="28" rx="10"
    fill="#F8F6F0" fill-opacity="0.10" stroke="#D9D4C8" stroke-opacity="0.20"/>
  <rect x="415" y="8" width="138" height="28" rx="10"
    fill="#F8F6F0" fill-opacity="0.10" stroke="#D9D4C8" stroke-opacity="0.20"/>
  <text x="196" y="26" text-anchor="middle"
    style="font-size:13px; font-weight:600; fill:#2C2C2A;">Encoder block</text>
  <text x="484" y="26" text-anchor="middle"
    style="font-size:13px; font-weight:600; fill:#2C2C2A;">Decoder block</text>

  <!-- ── ENCODER ── -->

  <!-- input label -->
  <g class="blk b1">
    <text x="196" y="368" text-anchor="middle" style="font-size:11px; fill:#888780;">Input tokens</text>
  </g>
  <line class="blk b1" x1="196" y1="355" x2="196" y2="340"
    stroke="#B4B2A9" stroke-width="1" marker-end="url(#ar)"/>

  <!-- self-attention -->
  <g class="blk b2">
    <rect x="116" y="298" width="160" height="42" rx="7"
      fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="196" y="316" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:500; fill:#26215C;">Self-attention</text>
    <text x="196" y="332" text-anchor="middle" dominant-baseline="central"
      style="font-size:10px; fill:#534AB7;">all tokens ↔ all tokens</text>
  </g>
  <line class="blk b2" x1="196" y1="298" x2="196" y2="280"
    stroke="#B4B2A9" stroke-width="1" marker-end="url(#ar)"/>

  <!-- add & norm 1 -->
  <g class="blk b3">
    <rect x="116" y="238" width="160" height="42" rx="7"
      fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="196" y="262" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:500; fill:#2C2C2A;">Add &amp; Norm</text>
  </g>
  <line class="blk b3" x1="196" y1="238" x2="196" y2="220"
    stroke="#B4B2A9" stroke-width="1" marker-end="url(#ar)"/>

  <!-- feed-forward -->
  <g class="blk b4">
    <rect x="116" y="178" width="160" height="42" rx="7"
      fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="196" y="196" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:500; fill:#04342C;">Feed-forward</text>
    <text x="196" y="212" text-anchor="middle" dominant-baseline="central"
      style="font-size:10px; fill:#0F6E56;">position-wise MLP</text>
  </g>
  <line class="blk b4" x1="196" y1="178" x2="196" y2="160"
    stroke="#B4B2A9" stroke-width="1" marker-end="url(#ar)"/>

  <!-- add & norm 2 -->
  <g class="blk b5">
    <rect x="116" y="118" width="160" height="42" rx="7"
      fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="196" y="142" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:500; fill:#2C2C2A;">Add &amp; Norm</text>
  </g>

  <!-- encoder output label -->
  <g class="blk b5">
    <text x="196" y="108" text-anchor="middle" style="font-size:11px; fill:#0F6E56; font-weight:500;">encoder output →</text>
  </g>

  <!-- ── DECODER ── -->

  <!-- input label -->
  <g class="blk b1">
    <text x="484" y="368" text-anchor="middle" style="font-size:11px; fill:#888780;">Output tokens (so far)</text>
  </g>
  <line class="blk b1" x1="484" y1="355" x2="484" y2="340"
    stroke="#B4B2A9" stroke-width="1" marker-end="url(#ar)"/>

  <!-- masked self-attention -->
  <g class="blk b2">
    <rect x="404" y="298" width="160" height="42" rx="7"
      fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="484" y="315" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:500; fill:#4A1B0C;">Masked self-attn</text>
    <text x="484" y="331" text-anchor="middle" dominant-baseline="central"
      style="font-size:10px; fill:#993C1D;">no future tokens</text>
  </g>
  <line class="blk b2" x1="484" y1="298" x2="484" y2="280"
    stroke="#B4B2A9" stroke-width="1" marker-end="url(#ar)"/>

  <!-- add & norm 1 -->
  <g class="blk b3">
    <rect x="404" y="238" width="160" height="42" rx="7"
      fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="484" y="262" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:500; fill:#2C2C2A;">Add &amp; Norm</text>
  </g>
  <line class="blk b3" x1="484" y1="238" x2="484" y2="220"
    stroke="#B4B2A9" stroke-width="1" marker-end="url(#ar)"/>

  <!-- enc-dec attention -->
  <g class="blk b6">
    <rect x="404" y="178" width="160" height="42" rx="7"
      fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="484" y="195" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:500; fill:#26215C;">Enc-dec attention</text>
    <text x="484" y="211" text-anchor="middle" dominant-baseline="central"
      style="font-size:10px; fill:#534AB7;">attends to encoder</text>
  </g>
  <line class="blk b6" x1="484" y1="178" x2="484" y2="160"
    stroke="#B4B2A9" stroke-width="1" marker-end="url(#ar)"/>

  <!-- add & norm 2 -->
  <g class="blk b7">
    <rect x="404" y="118" width="160" height="42" rx="7"
      fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
    <text x="484" y="142" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:500; fill:#2C2C2A;">Add &amp; Norm</text>
  </g>
  <line class="blk b7" x1="484" y1="118" x2="484" y2="100"
    stroke="#B4B2A9" stroke-width="1" marker-end="url(#ar)"/>

  <!-- feed-forward -->
  <g class="blk b8">
    <rect x="404" y="58" width="160" height="42" rx="7"
      fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="484" y="76" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:500; fill:#04342C;">Feed-forward</text>
    <text x="484" y="92" text-anchor="middle" dominant-baseline="central"
      style="font-size:10px; fill:#0F6E56;">position-wise MLP</text>
  </g>

  <!-- dashed cross-attention connector (encoder → decoder) with animated flow -->
  <g class="blk b9">
    <path class="flow-line"
      d="M 276 139 Q 340 139 340 199 Q 340 199 404 199"
      fill="none" stroke="#534AB7" stroke-width="1.5"
      marker-end="url(#ar)"/>
    <text x="340" y="174" text-anchor="middle"
      style="font-size:10px; fill:#534AB7; font-style:italic;">encoder output feeds here</text>
  </g>

</svg>
