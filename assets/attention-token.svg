<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" role="img"
  style="font-family: ui-sans-serif, system-ui, sans-serif; background: transparent;">
  <title>Context helps interpret "it"</title>
  <desc>Sentence shown at the top: The animal did not cross the street because it was tired. The query token it is highlighted, and attention lines show that animal has the strongest influence on how it is interpreted.</desc>

  <defs>
    <style>
      @keyframes pulse-heavy { 0%,100%{opacity:0.88} 50%{opacity:0.52} }
      @keyframes pulse-mid   { 0%,100%{opacity:0.56} 50%{opacity:0.30} }
      @keyframes pulse-light { 0%,100%{opacity:0.26} 50%{opacity:0.12} }
      @keyframes bob { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-3px)} }
      @media (prefers-reduced-motion: reduce) {
        .line-heavy, .line-mid, .line-light, .token-query { animation: none !important; }
      }
      .line-heavy { animation: pulse-heavy 2.2s ease-in-out infinite; }
      .line-mid   { animation: pulse-mid 2.8s ease-in-out infinite 0.4s; }
      .line-light { animation: pulse-light 3.1s ease-in-out infinite 0.8s; }
      .token-query { animation: bob 3s ease-in-out infinite; }
    </style>
  </defs>

  <text x="380" y="26" text-anchor="middle"
    style="font-size:15px; font-weight:600; fill:#2C2C2A;">
    Context helps the model interpret "it"
  </text>
  <text x="380" y="48" text-anchor="middle"
    style="font-size:12px; fill:#6F6E68;">
    In "The animal did not cross the street because it was tired", the word "animal" gives the clearest clue.
  </text>

  <rect x="36" y="68" width="688" height="42" rx="10"
    fill="#F8F6F0" stroke="#D9D4C8" stroke-width="1"/>
  <text x="380" y="94" text-anchor="middle"
    style="font-size:14px; fill:#3D3C38; font-family: ui-monospace, monospace;">
    The animal did not cross the street because it was tired.
  </text>

  <text x="380" y="136" text-anchor="middle"
    style="font-size:11px; fill:#8A887E; font-style:italic;">
    Higher weight = more influence on the meaning of "it"
  </text>

  <line class="line-light" x1="566" y1="203" x2="95" y2="203"
    stroke="#9088E8" stroke-width="1.2" stroke-linecap="round"/>
  <line class="line-heavy" x1="566" y1="189" x2="215" y2="189"
    stroke="#4C41B8" stroke-width="5.2" stroke-linecap="round"/>
  <line class="line-light" x1="566" y1="210" x2="334" y2="210"
    stroke="#9088E8" stroke-width="1.2" stroke-linecap="round"/>
  <line class="line-mid" x1="566" y1="196" x2="451" y2="196"
    stroke="#6F63DA" stroke-width="2.6" stroke-linecap="round"/>

  <rect x="60" y="178" width="70" height="40" rx="8"
    fill="#F1EFE8" stroke="#BDB9AF" stroke-width="0.8"/>
  <text x="95" y="203" text-anchor="middle" dominant-baseline="central"
    style="font-size:13px; fill:#4A4944;">The</text>
  <text x="95" y="232" text-anchor="middle"
    style="font-size:10px; fill:#9A978C;">0.04</text>

  <rect x="166" y="176" width="98" height="44" rx="9"
    fill="#EEEDFE" stroke="#4C41B8" stroke-width="1.6"/>
  <text x="215" y="198" text-anchor="middle" dominant-baseline="central"
    style="font-size:14px; font-weight:600; fill:#342D82;">animal</text>
  <text x="215" y="232" text-anchor="middle"
    style="font-size:10px; fill:#4C41B8;">0.74</text>

  <rect x="302" y="178" width="64" height="40" rx="8"
    fill="#F1EFE8" stroke="#BDB9AF" stroke-width="0.8"/>
  <text x="334" y="203" text-anchor="middle" dominant-baseline="central"
    style="font-size:13px; fill:#4A4944;">street</text>
  <text x="334" y="232" text-anchor="middle"
    style="font-size:10px; fill:#9A978C;">0.08</text>

  <rect x="406" y="178" width="90" height="40" rx="8"
    fill="#EFEAFE" stroke="#6F63DA" stroke-width="1"/>
  <text x="451" y="203" text-anchor="middle" dominant-baseline="central"
    style="font-size:13px; font-weight:500; fill:#473E99;">because</text>
  <text x="451" y="232" text-anchor="middle"
    style="font-size:10px; fill:#6F63DA;">0.27</text>

  <g class="token-query" style="transform-origin: 598px 198px;">
    <rect x="566" y="176" width="64" height="44" rx="9"
      fill="#FAEEDA" stroke="#BA7517" stroke-width="1.6"/>
    <text x="598" y="199" text-anchor="middle" dominant-baseline="central"
      style="font-size:14px; font-weight:600; fill:#633806;">it</text>
    <text x="598" y="232" text-anchor="middle"
      style="font-size:10px; fill:#BA7517;">query</text>
  </g>

  <rect x="650" y="178" width="58" height="40" rx="8"
    fill="#F1EFE8" stroke="#BDB9AF" stroke-width="0.8"/>
  <text x="679" y="203" text-anchor="middle" dominant-baseline="central"
    style="font-size:13px; fill:#4A4944;">tired</text>
  <text x="679" y="232" text-anchor="middle"
    style="font-size:10px; fill:#9A978C;">0.11</text>

  <text x="215" y="154" text-anchor="middle"
    style="font-size:11px; fill:#4C41B8; font-weight:600;">
    strongest clue
  </text>

  <line x1="84" y1="286" x2="120" y2="286" stroke="#4C41B8" stroke-width="5" stroke-linecap="round"/>
  <text x="127" y="290" style="font-size:11px; fill:#5F5E5A;">high weight</text>
  <line x1="228" y1="286" x2="264" y2="286" stroke="#6F63DA" stroke-width="2.6" stroke-linecap="round"/>
  <text x="271" y="290" style="font-size:11px; fill:#5F5E5A;">medium</text>
  <line x1="362" y1="286" x2="398" y2="286" stroke="#9088E8" stroke-width="1.2" stroke-linecap="round"/>
  <text x="405" y="290" style="font-size:11px; fill:#5F5E5A;">low</text>

  <rect x="490" y="276" width="72" height="20" rx="6"
    fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="526" y="290" text-anchor="middle"
    style="font-size:10px; fill:#633806;">query token</text>

  <rect x="592" y="276" width="88" height="20" rx="6"
    fill="#EEEDFE" stroke="#4C41B8" stroke-width="1"/>
  <text x="636" y="290" text-anchor="middle"
    style="font-size:10px; fill:#342D82;">best context clue</text>
</svg>
