<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 310" role="img"
  style="font-family: ui-sans-serif, system-ui, sans-serif; background: transparent;">
  <title>Token self-attention</title>
  <desc>Five tokens shown in a row. The active query token "it" fans attention lines of varying thickness and opacity to every other token. Line weight encodes attention strength.</desc>

  <defs>
    <style>
      @keyframes pulse-heavy { 0%,100%{opacity:0.85} 50%{opacity:0.45} }
      @keyframes pulse-mid   { 0%,100%{opacity:0.55} 50%{opacity:0.28} }
      @keyframes pulse-light { 0%,100%{opacity:0.22} 50%{opacity:0.10} }
      @keyframes bob { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-3px)} }
      @media (prefers-reduced-motion: reduce) {
        .line-heavy, .line-mid, .line-light, .token-active { animation: none !important; }
      }
      .line-heavy { animation: pulse-heavy 2.2s ease-in-out infinite; }
      .line-mid   { animation: pulse-mid   2.8s ease-in-out infinite 0.4s; }
      .line-light { animation: pulse-light 3.2s ease-in-out infinite 0.8s; }
      .token-active { animation: bob 3s ease-in-out infinite; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
      markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
        stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- caption -->
  <text x="340" y="22" text-anchor="middle"
    style="font-size:11px; fill:#888780; font-style:italic">
    Self-attention — "it" attends to every token simultaneously
  </text>

  <!-- attention lines from "it" (x=560) to others, line weight = weight -->

  <!-- to "The" x=80  — weak -->
  <line class="line-light" x1="535" y1="185" x2="117" y2="185"
    stroke="#7F77DD" stroke-width="1.2" stroke-linecap="round"/>

  <!-- to "animal" x=190 — strongest -->
  <line class="line-heavy" x1="535" y1="181" x2="232" y2="181"
    stroke="#534AB7" stroke-width="5" stroke-linecap="round"/>

  <!-- to "did" x=300 — weak -->
  <line class="line-light" x1="535" y1="189" x2="347" y2="189"
    stroke="#7F77DD" stroke-width="1" stroke-linecap="round"/>

  <!-- to "cross" x=430 — medium -->
  <line class="line-mid" x1="535" y1="177" x2="467" y2="177"
    stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"/>

  <!-- token boxes -->

  <!-- "The" -->
  <rect x="42" y="163" width="76" height="38" rx="7"
    fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="80" y="185" text-anchor="middle" dominant-baseline="central"
    style="font-size:13px; fill:#444441;">The</text>
  <text x="80" y="212" text-anchor="middle"
    style="font-size:10px; fill:#888780;">0.12</text>

  <!-- "animal" -->
  <rect x="154" y="163" width="90" height="38" rx="7"
    fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="199" y="185" text-anchor="middle" dominant-baseline="central"
    style="font-size:13px; font-weight:500; fill:#3C3489;">animal</text>
  <text x="199" y="212" text-anchor="middle"
    style="font-size:10px; fill:#534AB7;">0.74</text>

  <!-- "did" -->
  <rect x="265" y="163" width="76" height="38" rx="7"
    fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="303" y="185" text-anchor="middle" dominant-baseline="central"
    style="font-size:13px; fill:#444441;">did</text>
  <text x="303" y="212" text-anchor="middle"
    style="font-size:10px; fill:#888780;">0.08</text>

  <!-- "cross" -->
  <rect x="374" y="163" width="86" height="38" rx="7"
    fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="417" y="185" text-anchor="middle" dominant-baseline="central"
    style="font-size:13px; fill:#444441;">cross</text>
  <text x="417" y="212" text-anchor="middle"
    style="font-size:10px; fill:#888780;">0.31</text>

  <!-- "it" — active query, bobs -->
  <g class="token-active" style="transform-origin: 562px 182px;">
    <rect x="522" y="163" width="76" height="38" rx="7"
      fill="#FAEEDA" stroke="#BA7517" stroke-width="1.5"/>
    <text x="560" y="182" text-anchor="middle" dominant-baseline="central"
      style="font-size:13px; font-weight:600; fill:#633806;">it</text>
    <text x="560" y="212" text-anchor="middle"
      style="font-size:10px; fill:#BA7517;">query</text>
  </g>

  <!-- legend -->
  <line x1="42" y1="252" x2="78" y2="252" stroke="#534AB7" stroke-width="5" stroke-linecap="round"/>
  <text x="84" y="256" style="font-size:11px; fill:#5F5E5A;">high weight</text>
  <line x1="172" y1="252" x2="208" y2="252" stroke="#7F77DD" stroke-width="2" stroke-linecap="round"/>
  <text x="214" y="256" style="font-size:11px; fill:#5F5E5A;">medium</text>
  <line x1="290" y1="252" x2="326" y2="252" stroke="#AFA9EC" stroke-width="1" stroke-linecap="round"/>
  <text x="332" y="256" style="font-size:11px; fill:#5F5E5A;">low weight</text>
  <rect x="420" y="243" width="54" height="18" rx="5" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="447" y="256" text-anchor="middle" style="font-size:10px; fill:#633806;">query</text>

</svg>
